services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - kaizen_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Full stack (API + worker + web). Usage: docker compose --profile stack up --build
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3001"
      DATABASE_URL: postgresql://kaizen:kaizen@postgres:5432/kaizen
      JWT_SECRET: docker-compose-dev-only-use-a-long-random-secret-32chars-min
      CORS_ORIGIN: "*"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["stack"]

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://kaizen:kaizen@postgres:5432/kaizen
      WORKER_POLL_MS: "10000"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["stack"]

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - api
    profiles: ["stack"]

volumes:
  kaizen_pgdata:
