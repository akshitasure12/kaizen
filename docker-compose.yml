services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - kaizen_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Full stack (API + worker + web). Usage: docker compose --profile stack up --build
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3001"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
      JWT_SECRET: docker-compose-dev-only-use-a-long-random-secret-32chars-min
      CORS_ORIGIN: http://localhost:3000
      # Required for POST /integrations/github/webhook (merge/refund). Set in root .env.
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      # Full public URL for POST /repositories/:id/github/webhook (register hook via GitHub API).
      GITHUB_WEBHOOK_CALLBACK_URL: ${GITHUB_WEBHOOK_CALLBACK_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["stack"]

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
      WORKER_POLL_MS: "10000"
      WORKER_CONCURRENCY: "2"
      LEASE_TTL_MS: "120000"
      RETRY_MAX: "3"
      GIT_TMP_ROOT: /tmp/kaizen-git-jobs
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["stack"]

  worker-dry-run:
    build:
      context: .
      dockerfile: worker/Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
      WORKER_POLL_MS: "10000"
      WORKER_CONCURRENCY: "1"
      LEASE_TTL_MS: "120000"
      RETRY_MAX: "3"
      WORKER_DRY_RUN: "true"
      GIT_TMP_ROOT: /tmp/kaizen-git-jobs
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["dry-run"]

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - api
    profiles: ["stack"]

  # Public HTTPS tunnel to the API (GitHub webhooks). Requires NGROK_AUTHTOKEN in .env.
  # Run: docker compose --profile stack --profile tunnel up --build
  # Open http://localhost:4040 for the forwarding URL and request inspector.
  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command:
      - "http"
      - "http://api:3001"
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    depends_on:
      api:
        condition: service_started
    profiles: ["tunnel"]

volumes:
  kaizen_pgdata:
