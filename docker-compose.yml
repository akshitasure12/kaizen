services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - kaizen_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Full stack (API + worker + web). Usage: docker compose --profile stack up --build
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3001"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
      JWT_SECRET: docker-compose-dev-only-use-a-long-random-secret-32chars-min
      CORS_ORIGIN: http://localhost:3000
      GITHUB_WEBHOOK_SECRET: dev-webhook-secret
      GITHUB_APP_ID: "0"
      GITHUB_APP_PRIVATE_KEY: ""
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["stack"]

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
      WORKER_POLL_MS: "10000"
      WORKER_CONCURRENCY: "2"
      LEASE_TTL_MS: "120000"
      RETRY_MAX: "3"
      GIT_TMP_ROOT: /tmp/kaizen-git-jobs
      GITHUB_APP_ID: "0"
      GITHUB_APP_PRIVATE_KEY: ""
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["stack"]

  worker-dry-run:
    build:
      context: .
      dockerfile: worker/Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
      WORKER_POLL_MS: "10000"
      WORKER_CONCURRENCY: "1"
      LEASE_TTL_MS: "120000"
      RETRY_MAX: "3"
      WORKER_DRY_RUN: "true"
      GIT_TMP_ROOT: /tmp/kaizen-git-jobs
      GITHUB_APP_ID: "0"
      GITHUB_APP_PRIVATE_KEY: ""
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["dry-run"]

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - api
    profiles: ["stack"]

volumes:
  kaizen_pgdata:
